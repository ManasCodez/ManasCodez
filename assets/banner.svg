<svg width="1200" height="200" viewBox="0 0 1200 200"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#04070F">
<animate attributeName="stop-color"
values="#04070F;#091328;#04070F"
dur="10s"
repeatCount="indefinite"/>
</stop>
<stop offset="100%" stop-color="#150035">
<animate attributeName="stop-color"
values="#150035;#24004f;#150035"
dur="10s"
repeatCount="indefinite"/>
</stop>
</linearGradient>

<linearGradient id="neon" x1="0%" y1="0%" x2="100%">
<stop offset="0%" stop-color="#00F5FF"/>
<stop offset="100%" stop-color="#C026FF"/>
</linearGradient>

<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="4" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<filter id="bigGlow">
<feGaussianBlur stdDeviation="18"/>
</filter>

<pattern id="hex" width="60" height="52" patternUnits="userSpaceOnUse">
<path d="M15 1L45 1L59 26L45 51L15 51L1 26Z"
fill="none"
stroke="#3B82F6"
stroke-opacity=".08"/>
</pattern>

</defs>

<!-- Background -->

<rect width="1200" height="200" fill="url(#bg)"/>

<rect width="1200" height="200" fill="url(#hex)"/>

<!-- Neon Lights -->

<circle cx="180" cy="70" r="120" fill="#00F5FF" opacity=".15" filter="url(#bigGlow)">
<animate attributeName="opacity"
values=".1;.22;.1"
dur="4s"
repeatCount="indefinite"/>
</circle>

<circle cx="1030" cy="120" r="120" fill="#C026FF" opacity=".15" filter="url(#bigGlow)">
<animate attributeName="opacity"
values=".1;.22;.1"
dur="5s"
repeatCount="indefinite"/>
</circle>

<!-- Circuit -->

<g stroke="#00F5FF" stroke-width="1.3" opacity=".45">

<path d="M0 50H120V30H220"/>
<path d="M0 95H70V120H180"/>
<path d="M0 150H120V170H250"/>

<circle cx="220" cy="30" r="3" fill="#00F5FF"/>
<circle cx="180" cy="120" r="3" fill="#00F5FF"/>
<circle cx="250" cy="170" r="3" fill="#00F5FF"/>

</g>

<g stroke="#C026FF" stroke-width="1.3" opacity=".45">

<path d="M1200 50H1080V30H980"/>
<path d="M1200 95H1110V120H1010"/>
<path d="M1200 150H1080V170H950"/>

<circle cx="980" cy="30" r="3" fill="#C026FF"/>
<circle cx="1010" cy="120" r="3" fill="#C026FF"/>
<circle cx="950" cy="170" r="3" fill="#C026FF"/>

</g>

<!-- Scan Line -->

<rect x="0" y="0" width="1200" height="3"
fill="#00F5FF"
opacity=".5">

<animate attributeName="y"
values="0;200;0"
dur="6s"
repeatCount="indefinite"/>

</rect>

<!-- Glass Card -->

<rect
x="270"
y="40"
width="660"
height="120"
rx="18"
fill="white"
fill-opacity=".03"
stroke="url(#neon)"
stroke-opacity=".35"/>

<!-- Name -->

<text
x="600"
y="90"
font-size="50"
font-weight="700"
font-family="Segoe UI"
fill="white"
text-anchor="middle"
filter="url(#glow)">

Manas Sharma

<animate attributeName="opacity"
values=".9;1;.9"
dur="2.5s"
repeatCount="indefinite"/>

</text>

<!-- Subtitle -->

<text
x="600"
y="122"
font-size="18"
font-family="Segoe UI"
fill="#A5F3FC"
text-anchor="middle">

Building at the intersection of
<tspan fill="#00F5FF"> DSA </tspan>
•
<tspan fill="#C026FF"> Systems </tspan>
•
<tspan fill="#38BDF8"> ML </tspan>

</text>

<!-- Code Icon -->

<g transform="translate(120 72)" filter="url(#glow)">
<text
font-size="40"
font-family="Consolas"
fill="#00F5FF">&lt;/&gt;</text>
</g>

<!-- AI Network -->

<g transform="translate(1030 95)"
stroke="#C026FF"
stroke-width="2"
fill="#C026FF">

<circle cx="0" cy="-30" r="3"/>
<circle cx="-22" cy="0" r="3"/>
<circle cx="22" cy="0" r="3"/>
<circle cx="0" cy="30" r="3"/>
<circle cx="-35" cy="-18" r="3"/>
<circle cx="35" cy="-18" r="3"/>
<circle cx="-35" cy="18" r="3"/>
<circle cx="35" cy="18" r="3"/>

<line x1="0" y1="-30" x2="-22" y2="0"/>
<line x1="0" y1="-30" x2="22" y2="0"/>
<line x1="-22" y1="0" x2="0" y2="30"/>
<line x1="22" y1="0" x2="0" y2="30"/>
<line x1="-35" y1="-18" x2="0" y2="-30"/>
<line x1="35" y1="-18" x2="0" y2="-30"/>
<line x1="-35" y1="18" x2="0" y2="30"/>
<line x1="35" y1="18" x2="0" y2="30"/>

</g>

<!-- Animated Stars -->

<g fill="#00F5FF">

<circle cx="160" cy="45" r="2">
<animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
</circle>

<circle cx="360" cy="25" r="2">
<animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/>
</circle>

<circle cx="830" cy="170" r="2">
<animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
</circle>

<circle cx="1080" cy="40" r="2">
<animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite"/>
</circle>

</g>

<!-- Animated Border -->

<rect
x="2"
y="2"
width="1196"
height="196"
rx="10"
fill="none"
stroke="url(#neon)"
stroke-width="2"
stroke-dasharray="20 10">

<animate attributeName="stroke-dashoffset"
from="0"
to="60"
dur="3s"
repeatCount="indefinite"/>

</rect>

</svg>